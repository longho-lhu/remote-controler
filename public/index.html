<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RC Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="logo">
    <span class="logo-icon">🎮</span>
    <span class="logo-text">RC <strong>Controller</strong></span>
  </div>
  <div class="mqtt-badge" id="mqttBadge">
    <span class="dot" id="mqttDot"></span>
    <span id="mqttLabel">Connecting…</span>
  </div>
  <div class="gamepad-badge" id="gamepadBadge">
    <span class="dot" id="gamepadDot"></span>
    <span id="gamepadLabel">TX: –</span>
  </div>
  <button class="btn-serial" id="btnSerial" title="Kết nối Serial Port">
    <span class="serial-dot" id="serialDot"></span>
    <span id="serialLabel">Serial</span>
  </button>
  <button class="btn-settings" id="btnSettings" title="Cài đặt">⚙</button>
</header>

<!-- ── Settings panel ──────────────────────────────────────────────────────── -->
<div class="settings-overlay" id="settingsOverlay" hidden>
  <div class="settings-card">
    <h2>⚙ Cài đặt</h2>

    <div class="settings-section-title">📡 MQTT Broker</div>
    <label>Host / IP
      <input type="text" id="cfgHost" placeholder="broker.hivemq.com" />
    </label>
    <label>Port
      <input type="number" id="cfgPort" placeholder="1883" value="1883" />
    </label>
    <label>Username (tuỳ chọn)
      <input type="text" id="cfgUser" placeholder="" />
    </label>
    <label>Password (tuỳ chọn)
      <input type="password" id="cfgPass" placeholder="" />
    </label>

    <div class="settings-section-title">📹 Video Stream</div>
    <label>URL nguồn (MJPEG / HLS / MP4)
      <input type="text" id="cfgVideoUrl" placeholder="http://192.168.1.100:8080/video" />
    </label>
    <label>Loại nguồn
      <select id="cfgVideoType">
        <option value="mjpeg">MJPEG (img stream)</option>
        <option value="hls">HLS / MP4 (video tag)</option>
        <option value="webrtc">WebRTC (URL kênh)</option>
      </select>
    </label>

    <div class="settings-actions">
      <button class="btn-apply" id="btnApply">Áp dụng</button>
      <button class="btn-cancel" id="btnCancel">Huỷ</button>
    </div>
  </div>
</div>

<!-- ── Main layout ─────────────────────────────────────────────────────────── -->
<main class="main-content">

    <!-- ── Video Panel ──────────────────────────────────────────────────── -->
    <div class="video-panel">
      <div class="video-label">📹 FPV LIVE</div>
      <div class="video-wrap" id="videoWrap">
        <!-- MJPEG mode -->
        <img id="imgFeed" class="feed-img" style="display:none" alt="stream" />
        <!-- HLS / MP4 mode -->
        <video id="videoFeed" class="feed-video" autoplay playsinline muted style="display:none"></video>
        <!-- No signal -->
        <div class="video-nosignal" id="videoNoSignal">
          <div class="nosignal-icon">📡</div>
          <div class="nosignal-text">NO SIGNAL</div>
          <div class="nosignal-hint">Cấu hình URL video trong ⚙ Settings</div>
        </div>
        <!-- HUD overlay -->
        <div class="video-hud">
          <div class="hud-left">
            <span class="hud-item"><span class="hud-lbl">DIR</span><span class="hud-val" id="hudDir">STOP</span></span>
            <span class="hud-item"><span class="hud-lbl">SPD</span><span class="hud-val" id="hudSpd">0%</span></span>
            <span class="hud-item"><span class="hud-lbl">MQTT</span><span class="hud-val" id="hudMqtt">–</span></span>
          </div>
          <div class="hud-right">
            <div class="hud-arrow" id="arrowChevron">■</div>
          </div>
        </div>
      </div>
      <!-- Telemetry channel strip -->
      <div class="telem-strip">
        <div class="telem-item"><span class="tl">ROLL CH1</span><span class="tv" id="ch1Val">–</span></div>
        <div class="telem-item"><span class="tl">PITCH CH2</span><span class="tv" id="ch2Val">–</span></div>
        <div class="telem-item"><span class="tl">THR CH3</span><span class="tv" id="ch3Val">–</span></div>
        <div class="telem-item"><span class="tl">YAW CH4</span><span class="tv" id="ch4Val">–</span></div>
        <div class="telem-item"><span class="tl">CH5</span><span class="tv" id="ch5Val">–</span></div>
        <div class="telem-item"><span class="tl">CH6</span><span class="tv" id="ch6Val">–</span></div>
        <div class="telem-item tx-status"><span class="tl">TX</span><span class="tv tx-val" id="txStatus">NOT CONNECTED</span></div>
        <!-- Direction LEDs -->
        <div class="telem-leds">
          <span class="led" id="ledForward"  data-label="FWD"></span>
          <span class="led" id="ledBackward" data-label="BWD"></span>
          <span class="led" id="ledLeft"     data-label="L"></span>
          <span class="led" id="ledRight"    data-label="R"></span>
          <span class="led" id="ledStop"     data-label="STP"></span>
        </div>
      </div>
    </div>


</main>

<!-- ── Log panel ───────────────────────────────────────────────────────────── -->
<section class="log-panel">
  <div class="log-header">
    <span>📋 MQTT Log</span>
    <button class="btn-clear" id="btnClear">Clear</button>
  </div>
  <ul class="log-list" id="logList"></ul>
</section>



<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>
